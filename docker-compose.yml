services:
  api:
    image: musarehan/insurance-premium-prediction-api
    container_name: insurance-api
    ports:
      - "8000:8000"

  frontend:
    image: musarehan/insurance-frontend
    container_name: insurance-frontend
    ports:
      - "8501:8501"
    env_file:
      - .env
    depends_on:
      - api